worth_stealing:
  - "4-layer context cascade: lossless before lossy, local before global — progressive degradation preserves maximum information"
  - "Streaming tool execution with RWLock: start executing read-only tools while the model is still generating"
  - "buildTool() factory over inheritance: each tool is a plain object with schema, permissions, execution, UI rendering co-located"

easter_eggs:
  - "18 virtual pet species with hex-encoded names (duck through chonk), RPG stats, 5 rarity tiers, 1% shiny variants"
  - "KAIROS autonomous mode — Greek for 'the right moment', enables fully autonomous operation"
  - "Anti-distillation fake tools that poison training data if competitors try to distill behavior"
  - "tengu_ prefix on all runtime feature gates — Japanese for heavenly dog, the project codename"

