characteristics:
  architecture: "onion-shape: Guard wraps Runner wraps ValidatorService wraps individual Validators, async validator execution by default"
  code_organization: "18K LOC Python in 178 files, 1076-line Guard central orchestrator class, Pydantic v2 + LiteLLM + OpenTelemetry"
  security_approach: "validators pip-install from git URLs via Validator Hub (npm-for-LLM-constraints), supply chain integrity depends on Hub package vetting"
  context_strategy: "streaming chunk accumulation: accumulates LLM response chunks until sentence boundary before validating"
  documentation: "API docs and validator catalog thorough, jsonformer escape hatch under @experimental decorator, reask loop mechanics are an area for future documentation growth"

features:
  sandbox: none
  agent_loop: custom
  context_management: none
  stuck_detection: false
  multi_agent: false
  mcp_support: false
  plugin_system: true
  security:
    layers: 0
    types: []
  providers:
    count: 1
    names: [litellm]

key_finding: "Validator Hub (npm-for-LLM-constraints), reask self-correction loop with 8 OnFailAction variants"

worth_stealing:
  - "OnFailAction pattern: 8 variants (reask/fix/filter/refrain/noop/exception/fix_reask/custom) cover the entire error-handling decision tree"
  - "Streaming chunk accumulation: accumulates LLM chunks until sentence boundary before validating"
  - "Reask loop with budget ceiling: targeted feedback with exact failing field, capped at configurable num_reasks"

easter_eggs:
  - "jsonformer escape hatch: hidden @experimental decorator for constrained JSON generation, bypassing normal pipeline"
  - "text2sql application: entire text-to-SQL pipeline living inside the library source code"
  - "Typo '_configure_hub_telemtry' (missing 'e') has shipped since early versions"
  - "Remote inference: validators can call JWT-authenticated Hub endpoints — validation involves network calls to Guardrails servers"

