# Meta.yaml V2 Schema — awesome-ai-anatomy
# Every teardown directory must have a meta.yaml following this schema.
# These files power automated comparison table generation (future).

# ─── Basic Info ───────────────────────────────────────────────
name: ProjectName               # Display name
repo: org/repo                  # GitHub org/repo
stars: 12345                    # GitHub star count
forks: 123                     # GitHub fork count
language: [Python, TypeScript]  # Primary languages
loc: 400000                    # Lines of code (approximate)
license: MIT                   # SPDX license identifier
created: "2024-03-13"         # First commit / creation date
data_as_of: "2026-04"         # When this data was collected

# ─── Classification ──────────────────────────────────────────
# category: what the project IS
#   coding-agent | workflow-engine | browser | security-framework |
#   memory-system | social-simulation | dev-tool
category: coding-agent

# maturity: project lifecycle stage
#   production | beta | experimental
maturity: production

# deployment: primary installation method
#   binary | npm | pip | docker | docker-compose
deployment: npm

# ─── Characteristics (factual descriptions, no grades) ───────
characteristics:
  architecture: "describe the architectural pattern concretely"          # e.g. "queue-pair async event system"
  code_organization: "describe structure with concrete details"          # e.g. "88 Rust workspace crates, clean module boundaries"
  security_approach: "describe actual security mechanisms"               # e.g. "3-layer: seatbelt sandbox + Guardian AI approval + restricted token"
  context_strategy: "describe the context/memory mechanism"              # e.g. "4-layer cascade: compact, summarize, truncate, drop"
  documentation: "describe what documentation exists"                    # e.g. "inline code comments, architecture decision records"

# ─── Architecture Features ───────────────────────────────────
features:
  sandbox: docker               # docker | kubernetes | seatbelt | landlock | wasm | process_isolation | none
  agent_loop: event-driven      # react | plan-execute | event-driven | workflow-dag | custom
  context_management: condenser_pipeline  # condenser_pipeline | sliding_window | summarize | 4_layer_cascade | truncate | none
  stuck_detection: true         # Does the project detect stuck/looping agents?
  multi_agent: true             # Does the project support multiple agents?
  mcp_support: false            # Model Context Protocol support?
  plugin_system: false          # Extensible via plugins/extensions?
  security:
    layers: 3                   # Number of distinct security mechanisms
    types: [grayswan, invariant, llm-analyzer]  # Specific mechanism names
  providers:
    count: 1                    # Number of LLM providers supported
    names: [litellm]            # Specific provider names

# ─── Key Insights ─────────────────────────────────────────────
key_finding: "one-line summary of the most important discovery"

worth_stealing:
  - "Pattern 1 other projects should adopt"
  - "Pattern 2"

easter_eggs:
  - "Hidden discovery"          # or null if none

# ─── Tags (for filtering) ────────────────────────────────────
tags: [coding-agent, docker-sandbox, multi-agent]
