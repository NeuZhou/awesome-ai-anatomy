name: god-file
category: maintainability
description: "Single file containing the entire agent loop — thousands of lines with no separation of concerns"
severity: high
tags: [anti-pattern, maintainability, code-smell, technical-debt]

seen_in:
  - project: hermes-agent
    file: run_agent.py
    lines: 9000+
    notes: "The entire AIAgent class and agent loop in one file. Every PR touches this file."

impact:
  - "Every merge conflict happens in one file"
  - "New contributors can't find what they're looking for"
  - "Impossible to test individual components in isolation"
  - "IDE performance degrades on files this large"
  - "Code review is painful — diff of 9K file is unreadable"

better_alternative: "Middleware chain pattern (see: deer-flow) or at minimum, split into separate modules per concern"

notes: "This is a common pattern in fast-growing projects — the original author knows where everything is, so there's no incentive to refactor. By the time it hurts, the file is too big to safely split."
