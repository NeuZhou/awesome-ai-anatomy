name: no-cost-budget
category: safety
description: "Agent tracks token usage but has no way to set a spending limit or auto-stop when budget is exceeded"
severity: high
tags: [anti-pattern, safety, cost, budget]

seen_in:
  - project: deer-flow
    notes: "TokenUsageMiddleware tracks usage but no budget enforcement"
  - project: hermes-agent
    notes: "InsightsEngine tracks costs retroactively but no real-time limit"

impact:
  - "Runaway agent can accumulate hundreds of dollars in API costs"
  - "Especially dangerous with serverless compute (Modal, Daytona) where compute costs compound"
  - "SubAgent spawning multiplies the risk (3 children × parent cost)"
  - "No alerting mechanism — user discovers the bill after the fact"

better_alternative: "Per-session budget with hard stop. Track cumulative cost in real-time, warn at 80%, stop at 100%."

notes: "Neither DeerFlow nor Hermes implements this despite both supporting long-running sessions and parallel subagents. This is the single biggest production risk for self-hosted agent deployments."
