key_innovations:
  - "From-scratch headless browser in Zig; no CSS rendering, no paint pipeline, DOM-only"
  - "9x faster than Chrome, 16x less memory (benchmarked on 933 pages, EC2 m5.large)"
  - "Bitcast trick for zero-overhead V8 binding via Zig comptime generics"
  - "CDP + MCP dual protocol support (MCP server is 1733 lines)"
  - "Page.zig at 3660 lines handles full page lifecycle without framework overhead"
key_criticisms:
  - "Web API coverage limited to ~60 APIs; missing CORS, Service Workers, partial WebSocket"
  - "Single-connection-per-server limitation; concurrent scraping requires multiple instances"
  - "Zig language instability (0.15.2) means breaking changes between releases"
  - "Small contributor pool due to Zig's niche adoption"
  - "No CSS layout or screenshot capability; scripts relying on visual state will fail"
