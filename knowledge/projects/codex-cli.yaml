key_criticisms:
  - "codex-core is 176K lines in one crate; changing one line recompiles the entire crate"
  - "Session struct holds 40+ fields and is passed as Arc<Session> everywhere; hard to test"
  - "Windows sandbox is 8870 lines vs single API call on macOS; fragile and defaults to off"
  - "88+ feature flags create combinatorial testing problems with non-obvious interactions"
  - "Dual build system (Cargo + Bazel) adds contributor friction; MODULE.bazel.lock is 1.2MB"
  - "Context compaction is simpler than Claude Code's 4-layer cascade; summarization loses more info than necessary"
  - "112K lines for terminal UI is large (Helix editor is ~80K for a full terminal code editor)"
