name: memory-frozen-snapshot
category: memory
description: "Inject memory into system prompt as a frozen snapshot at session start. Mid-session writes update disk but don't change the running prompt."
tags: [memory, caching, prompt-cache, optimization]

first_seen:
  project: hermes-agent
  file: agent/builtin_memory_provider.py
  lines: 62-72
  date: 2026-04-05

also_seen: []

pros:
  - "Preserves LLM prefix cache for entire session (cost savings)"
  - "System prompt stability prevents mid-session confusion"
  - "Writes are immediately durable on disk"

cons:
  - "Agent can't see its own memory updates within current session"
  - "If session is very long, memory gets stale"

verdict: "Smart optimization. The cost savings from prefix caching are real, especially with long MEMORY.md files. Worth stealing for any agent that injects memory into system prompts."
