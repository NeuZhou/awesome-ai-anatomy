name: loop-detection
category: security
description: "Detect and break repetitive tool call loops using hash-based sliding window detection"
tags: [safety, loop, circuit-breaker, cost-protection]

first_seen:
  project: deer-flow
  file: backend/packages/harness/deerflow/agents/middlewares/loop_detection_middleware.py
  lines: 1-60
  date: 2026-04-05

also_seen:
  - project: hermes-agent
    notes: "Has max_iterations limit but no hash-based detection"

implementation:
  algorithm: "Hash tool calls (name+args, order-independent) → sliding window → warn at threshold → force-stop at hard limit"
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  lru_threads: 100

pros:
  - "Order-independent hashing prevents evasion by call reordering"
  - "Escalating response (warn then stop) gives model a chance to self-correct"
  - "Per-thread tracking with LRU eviction — memory bounded"

cons:
  - "Only detects exact repeats — novel but useless tool calls still pass"
  - "Hard limit of 5 may be too aggressive for some legitimate retry patterns"

verdict: "Essential safety feature. The $500 API bill from a runaway loop is real. Every production agent needs this. DeerFlow's implementation is clean and well-parameterized."
