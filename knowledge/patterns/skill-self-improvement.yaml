name: skill-self-improvement
category: memory
description: "Agent autonomously creates skills from experience and patches them during subsequent use"
tags: [learning, skills, procedural-memory, self-improvement]

first_seen:
  project: hermes-agent
  file: tools/skill_manager_tool.py
  lines: 1-60
  date: 2026-04-05

also_seen: []

not_used_by:
  - project: deer-flow
    notes: "Has skills but no auto-creation or self-improvement"
  - project: openclaw
    notes: "Skills are manual-only"

implementation:
  actions: [create, edit, patch, delete, write_file, remove_file]
  security: "Post-edit security scan via skills_guard.py"
  storage: "~/.hermes/skills/{skill-name}/SKILL.md"

pros:
  - "Genuine procedural memory — agent learns HOW to do things"
  - "Patch action allows targeted fixes without full rewrite"
  - "Security scanning on agent-authored skills prevents injection"

cons:
  - "Quality of auto-created skills depends on LLM capability"
  - "No automatic testing of skills — created skill might not work"
  - "Skill explosion risk — too many low-quality skills over time"

verdict: "The most interesting feature in Hermes. No other major agent framework does this. The security scanning is a nice touch. But needs a skill quality/relevance scoring system to prevent accumulation of junk skills."
