name: middleware-chain
category: architecture
description: "Chain of middleware functions that process each request sequentially, each handling one cross-cutting concern"
tags: [middleware, pipeline, chain-of-responsibility, extensibility]

first_seen:
  project: deer-flow
  file: backend/packages/harness/deerflow/agents/lead_agent/agent.py
  lines: 210-260
  date: 2026-04-05

also_seen:
  - project: openclaw
    notes: "Event-driven middleware equivalent"

not_used_by:
  - project: hermes-agent
    notes: "Monolithic 9K-line agent loop instead. No middleware separation."

pros:
  - "Each middleware is independently testable"
  - "Adding/removing features doesn't touch core agent logic"
  - "Ordering constraints are documented in code comments"

cons:
  - "Ordering dependencies become a DAG problem beyond ~15 middlewares"
  - "Debugging across middleware boundaries requires good logging"
  - "Performance overhead from passing through all layers even when not needed"

verdict: "Best pattern for agent frameworks that prioritize extensibility. DeerFlow's 14-layer chain is well-executed. Hermes's lack of this pattern is their biggest architectural debt."
