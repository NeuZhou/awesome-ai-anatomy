name: OpenAI Codex CLI
repo: openai/codex
stars: 27000
forks: 0
language:
  - Rust
loc: 549000
license: Apache-2.0
created: "2025-04"
data_as_of: "2026-04"

category: coding-agent
maturity: production
deployment: binary

characteristics:
  architecture: "queue-pair async event system (Sender<Submission>/Receiver<Event>), 88 Rust workspace crates, dual Cargo+Bazel build"
  code_organization: "549K LOC Rust across 1389 files, 162 test files, strict crate boundaries with codex-core (176K), codex-tui (112K), codex-cli (5K)"
  security_approach: "4-layer: seatbelt (macOS) + landlock/seccomp/bubblewrap (Linux) + restricted token/ACL (Windows) + Guardian AI auto-approval (risk_score < 80) + MITM network proxy"
  context_strategy: "two-phase memory extraction: per-rollout raw extraction then cross-rollout consolidation, summarize-based compaction"
  documentation: "crate-level docs, architecture decision records, cross-crate architecture requires reading the code"

features:
  sandbox: landlock
  agent_loop: custom
  context_management: summarize
  stuck_detection: false
  multi_agent: true
  mcp_support: true
  plugin_system: true
  security:
    layers: 4
    types: [seatbelt, landlock-seccomp, restricted-token, guardian-ai, network-proxy]
  providers:
    count: 1
    names: [openai]

key_finding: "Queue-pair architecture, Guardian AI auto-approval, 3-OS sandbox (17K LoC), MITM network proxy"

worth_stealing:
  - "Guardian pattern: separate AI model risk-scores actions in real-time, auto-approves if risk_score < 80"
  - "Queue-pair architecture: Sender<Submission>/Receiver<Event> decouples core from frontends (CLI, desktop, MCP)"
  - "Progressive sandbox escalation: try tightest sandbox first, retry with looser constraints on failure"
  - "Two-phase memory extraction: per-rollout raw extraction then cross-rollout consolidation"

easter_eggs:
  - "arg0-based multi-binary dispatch: same binary behaves differently based on executable name"
  - "Feature flag lifecycle stages: UnderDevelopment → Experimental → Stable → Deprecated → Removed"
  - "88 workspace crates — extreme modularity with MODULE.bazel.lock of 1.2MB"

tags:
  - coding-agent
  - cli
  - rust
  - sandbox
  - guardian-ai
  - multi-platform
