name: DeerFlow
repo: bytedance/deer-flow
stars: 58080
forks: 7241
language:
  - Python
  - TypeScript
loc: 0
license: MIT
created: "2025-05"
data_as_of: "2026-04"

category: workflow-engine
maturity: beta
deployment: docker

characteristics:
  architecture: "14-layer middleware chain over LangGraph, order-dependent (ClarificationMiddleware must be last), FastAPI + Next.js dual backend"
  code_organization: "Python backend + TypeScript frontend, v2.0 ground-up rewrite sharing zero code with v1, LangGraph tightly coupled"
  security_approach: "no auth, no RBAC — designed for trusted corporate network deployment, public use requires external auth layer"
  context_strategy: "summarize-based compaction, DanglingToolCallMiddleware patches orphan tool calls from interrupted sessions"
  documentation: "v2.0 rewrite docs exist, middleware ordering undocumented outside the source code"

features:
  sandbox: docker
  agent_loop: workflow-dag
  context_management: summarize
  stuck_detection: true
  multi_agent: true
  mcp_support: false
  plugin_system: false
  security:
    layers: 0
    types: []
  providers:
    count: 1
    names: [langgraph]

key_finding: "14-layer middleware chain, hash-based loop detection (warn@3, kill@5), no auth/RBAC"

worth_stealing:
  - "Middleware-first architecture: 14+ composable, testable middlewares for cross-cutting concerns"
  - "Hash-based loop detection: order-independent tool call hashing with escalating intervention at 3/5 repeats"
  - "DanglingToolCallMiddleware: patches orphan tool calls from interrupted sessions — most frameworks don't handle this"

easter_eggs:
  - "ClarificationMiddleware MUST be last — all-caps comment suggests someone learned this from a production incident"
  - "'SuperAgent harness' branding reveals ByteDance's positioning: DeerFlow is the harness, not the agent"
  - "200-line parallelism prompt: belt-and-suspenders from every time a model launched 8 parallel tasks and crashed"

tags:
  - workflow-engine
  - middleware-chain
  - multi-agent
  - langgraph
