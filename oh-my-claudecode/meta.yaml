name: oh-my-claudecode
repo: yeagerai/oh-my-claudecode
stars: 24423
forks: 2230
language:
  - TypeScript
loc: 194000
license: MIT
created: "2025-06"
data_as_of: "2026-04"

category: dev-tool
maturity: beta
deployment: npm

characteristics:
  architecture: "19-agent team via file-based IPC (inbox/outbox JSONL), mkdir-based cross-process locking with stale lock detection, tri-model coordination (Claude+Codex+Gemini)"
  code_organization: "194K LOC TypeScript, Claude Code plugin that also ships as npm package, phase controller infers state from task status distribution"
  security_approach: "inherits Claude Code's permission model — smart reuse of Anthropic's existing security infrastructure rather than reinventing it"
  context_strategy: "delegates context management to host agent (Claude Code/Codex/Gemini CLI) — avoids duplicating what each provider already handles well"
  documentation: "agent roles and 5-phase pipeline (plan→prd→exec→verify→fix) well-documented, IPC protocol details emerging as the project matures"

features:
  sandbox: none
  agent_loop: plan-execute
  context_management: none
  stuck_detection: false
  multi_agent: true
  mcp_support: false
  plugin_system: false
  security:
    layers: 0
    types: []
  providers:
    count: 3
    names: [anthropic, openai, google]

key_finding: "19-agent team via file IPC, mkdir-based locking, Haiku→Opus model tier routing, tri-model coordination"

worth_stealing:
  - "mkdir-based cross-process locking: atomic on all filesystems, with stale lock detection and exponential backoff"
  - "Model tier routing with prompt-as-Markdown: Haiku for critic (cheap), Opus for code-reviewer (deep reasoning), saves 30-50% on tokens"

easter_eggs:
  - "File-based IPC with inbox/outbox JSONL — lowest-common-denominator that works across Claude, Codex, and Gemini CLI processes"
  - "Phase controller infers current phase from task status distribution — no explicit state machine transitions"
  - "As a plugin depending on Claude Code internals, one Anthropic release could break everything"

tags:
  - multi-agent
  - claude-code-plugin
  - file-ipc
  - model-routing
  - team-orchestration
