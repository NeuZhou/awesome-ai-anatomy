key_finding: "19-agent team via file IPC, mkdir-based locking, Haiku→Opus model tier routing, tri-model coordination"

worth_stealing:
  - "mkdir-based cross-process locking: atomic on all filesystems, with stale lock detection and exponential backoff"
  - "Model tier routing with prompt-as-Markdown: Haiku for critic (cheap), Opus for code-reviewer (deep reasoning), saves 30-50% on tokens"

easter_eggs:
  - "File-based IPC with inbox/outbox JSONL — lowest-common-denominator that works across Claude, Codex, and Gemini CLI processes"
  - "Phase controller infers current phase from task status distribution — no explicit state machine transitions"
  - "As a plugin depending on Claude Code internals, one Anthropic release could break everything"

