name: Dify
repo: langgenius/dify
stars: 136306
forks: 21259
language:
  - Python
  - TypeScript
loc: 1283000
license: "Modified Apache 2.0"
created: "2023-04"
data_as_of: "2026-04"

category: workflow-engine
maturity: production
deployment: docker-compose

characteristics:
  architecture: "graphon DAG engine extracted to standalone PyPI package, 7+ Docker containers, plugin daemon as separate process"
  code_organization: "1.28M LOC (513K Python + 770K TypeScript), Flask/Gunicorn + Celery + Next.js + ReactFlow, 1600-line docker-compose"
  security_approach: "SSRF proxy (Squid) for HTTP node isolation, Go-based code sandbox for user-submitted code execution"
  context_strategy: "delegates context management to child engines; child engine spawning gives each loop iteration fresh VariablePool and runtime state"
  documentation: "end-user docs thorough, 30+ vector DB integrations individually documented, 400+ env vars in docker-compose"

features:
  sandbox: docker
  agent_loop: workflow-dag
  context_management: none
  stuck_detection: false
  multi_agent: true
  mcp_support: false
  plugin_system: true
  security:
    layers: 2
    types: [ssrf-proxy, code-sandbox]
  providers:
    count: 30
    names: [openai, anthropic, gemini, ollama, bedrock, azure, mistral, deepseek]

key_finding: "graphon engine, 7+ Docker containers, 30+ vector DBs, 1600-line docker-compose, plugin daemon"

worth_stealing:
  - "Layer-based graph engine middleware (graphon): extend workflow execution without modifying the engine"
  - "LLM-powered metadata filtering: prompts LLM with dataset schema to generate filter conditions automatically"
  - "Child engine spawning for iteration: each loop iteration gets fresh VariablePool and runtime state"

easter_eggs:
  - "docker-compose.yaml has 400+ environment variables — stopped counting"
  - "Modified Apache 2.0 license: commercial use >1M users requires a separate license"

tags:
  - workflow-engine
  - web-ui
  - docker-sandbox
  - rag-platform
  - plugin-system
  - low-code
