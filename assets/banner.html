<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 320px;
    overflow: hidden;
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .banner {
    width: 1280px;
    height: 320px;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
    position: relative;
    overflow: hidden;
  }
  /* Subtle grid pattern */
  .banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      linear-gradient(rgba(48, 54, 61, 0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(48, 54, 61, 0.3) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.5;
  }
  /* Accent glow */
  .banner::after {
    content: '';
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(56, 139, 253, 0.12) 0%, transparent 70%);
  }
  .left {
    display: flex;
    align-items: center;
    gap: 28px;
    z-index: 1;
  }
  .icon {
    font-size: 64px;
    filter: grayscale(0.2);
    line-height: 1;
  }
  .text {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .title {
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    font-size: 42px;
    font-weight: 700;
    color: #e6edf3;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 18px;
    color: #8b949e;
    font-weight: 400;
    letter-spacing: 0.3px;
  }
  .right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 16px;
    z-index: 1;
  }
  .stat {
    font-size: 16px;
    color: #58a6ff;
    font-weight: 500;
    letter-spacing: 0.5px;
    background: rgba(56, 139, 253, 0.1);
    border: 1px solid rgba(56, 139, 253, 0.2);
    padding: 8px 20px;
    border-radius: 20px;
  }
  .badge-row {
    display: flex;
    gap: 8px;
  }
  .mini-badge {
    font-size: 12px;
    color: #8b949e;
    background: rgba(110, 118, 129, 0.1);
    border: 1px solid rgba(110, 118, 129, 0.2);
    padding: 4px 12px;
    border-radius: 12px;
  }
  /* Border accents */
  .border-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #388bfd, #58a6ff, #388bfd, transparent);
  }
  .border-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(48, 54, 61, 0.6);
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="border-top"></div>
    <div class="left">
      <div class="icon">🔬</div>
      <div class="text">
        <div class="title">awesome-ai-anatomy</div>
        <div class="subtitle">Staff-engineer-level architecture teardowns</div>
      </div>
    </div>
    <div class="right">
      <div class="stat">10 projects · 2.5M lines analyzed</div>
      <div class="badge-row">
        <div class="mini-badge">📐 Architecture</div>
        <div class="mini-badge">🔍 Deep Dives</div>
        <div class="mini-badge">📊 Trade-offs</div>
      </div>
    </div>
    <div class="border-bottom"></div>
  </div>
</body>
</html>
